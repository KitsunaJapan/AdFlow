services:
  - type: web
    name: adflow
    env: node
    region: singapore  # 日本に最も近いリージョン
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PASSWORD
        sync: false   # Renderダッシュボードで手動設定
      - key: SESSION_SECRET
        generateValue: true   # Renderが自動生成
      # 以下はAPIキー取得後にRenderダッシュボードで追加
